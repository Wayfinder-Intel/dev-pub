<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMIN | vibe.pub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'JetBrains Mono', monospace;
            background-color: #050505;
            color: #d1d1d1;
        }
        input, textarea {
            background-color: #0d0d0d !important;
            border: 1px solid #333 !important;
            color: #fff !important;
            font-family: 'JetBrains Mono', monospace;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #ff00ff !important;
            box-shadow: 0 0 10px rgba(255, 0, 255, 0.2);
        }
        .btn-primary {
            background-color: #ff00ff;
            color: #fff;
            font-weight: bold;
            transition: all 0.2s;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
        }
        .btn-primary:hover {
            background-color: #d100d1;
            transform: translateY(-1px);
        }
        .btn-secondary {
            border: 1px solid #333;
            color: #888;
        }
        .btn-secondary:hover {
            border-color: #555;
            color: #fff;
        }
        pre {
            background-color: #0d0d0d;
            border: 1px solid #1a1a1a;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }
        .status-online { background-color: #ff00ff; box-shadow: 0 0 8px #ff00ff; }
        .status-offline { background-color: #ff3e3e; }
    </style>
</head>
<body class="p-6 md:p-12">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-12 border-b border-zinc-800 pb-6">
            <div class="flex items-center gap-6">
                <img src="../assets/vibe-pub-logo.png" alt="logo" class="h-16 w-auto drop-shadow-[0_0_10px_rgba(255,0,255,0.3)]">
                <div>
                    <h1 class="text-xl font-bold text-white tracking-widest uppercase">Admin<span class="text-[#ff00ff]">_</span>Dashboard</h1>
                    <div class="flex items-center gap-2 mt-1">
                        <p class="text-zinc-500 text-[9px] uppercase tracking-widest">Local Session Uplink</p>
                        <span class="text-zinc-800">|</span>
                        <div id="bridge-status-container" class="flex items-center gap-2">
                            <span id="bridge-dot" class="status-dot status-offline"></span>
                            <span id="bridge-text" class="text-[9px] font-bold text-zinc-600 uppercase">Disk_Link: Offline</span>
                        </div>
                    </div>
                </div>
            </div>
            <a href="https://wayfinder-intel.github.io/dev-pub/" target="_blank" class="btn-secondary px-4 py-2 text-xs rounded-sm">VIEW_LIVE_SITE</a>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-12">
            <!-- Left: Forms -->
            <div class="space-y-12">
                <!-- Session Config (Moved & Streamlined) -->
                <section>
                    <h2 class="text-xs uppercase tracking-widest text-[#ff00ff] font-bold mb-6 flex items-center justify-between">
                        <span class="flex items-center gap-2"><span class="w-2 h-2 bg-[#ff00ff] rounded-full"></span> 01_SESSION_SELECTOR</span>
                        <select id="session-select" onchange="switchSession(this.value)" class="bg-[#0d0d0d] border border-zinc-700 text-[10px] p-1 rounded-sm text-zinc-300 focus:border-[#ff00ff] outline-none">
                            <!-- Options injected here -->
                        </select>
                    </h2>
                    
                    <div id="session-meta-display" class="p-6 bg-[#0d0d0d] rounded-sm border border-zinc-800 space-y-4">
                        <!-- Metadata with Edit buttons injected here -->
                    </div>
                </section>

                <section>
                    <h2 class="text-xs uppercase tracking-widest text-[#00ff41] font-bold mb-6 flex items-center gap-2">
                        <span class="w-2 h-2 bg-[#00ff41] rounded-full"></span> 02_ADD_LOG_ENTRY
                    </h2>
                    <div class="space-y-4 p-6 bg-[#0d0d0d] rounded-sm border border-zinc-800">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div class="space-y-1">
                                <label class="text-[10px] text-zinc-500 uppercase">Contributor Name</label>
                                <input type="text" id="log-name" placeholder="Handle / Name" class="w-full p-3 rounded-sm text-sm">
                            </div>
                            <div class="space-y-1">
                                <label class="text-[10px] text-zinc-500 uppercase">Project Link</label>
                                <input type="text" id="log-link" placeholder="https://github.com/..." class="w-full p-3 rounded-sm text-sm">
                            </div>
                        </div>
                        <div class="space-y-1">
                            <label class="text-[10px] text-zinc-500 uppercase">Task Description</label>
                            <textarea id="log-desc" rows="3" placeholder="What was achieved?" class="w-full p-3 rounded-sm text-sm"></textarea>
                        </div>
                        <button onclick="addLogEntry()" class="btn-primary w-full py-3 text-sm rounded-sm uppercase tracking-tighter">Append to Session Log</button>
                    </div>
                </section>

                <section class="pt-8 border-t border-zinc-900">
                    <div class="flex flex-col gap-3">
                        <button onclick="createNewSession()" class="btn-secondary w-full py-3 text-xs rounded-sm uppercase tracking-tighter hover:border-[#ff00ff] hover:text-[#ff00ff] transition-all">Initialize New Session</button>
                        <button onclick="resetData()" class="text-[9px] text-red-500 uppercase hover:underline opacity-30 hover:opacity-100 transition-opacity w-full text-center">
                            [ DESTROY_LOCAL_CACHE_AND_REINITIALIZE ]
                        </button>
                    </div>
                </section>
            </div>

            <!-- Right: Management Interface -->
            <div class="relative">
                <div class="sticky top-12 space-y-6">
                    <h2 class="text-xs uppercase tracking-widest text-[#ff00ff] font-bold flex items-center justify-between">
                        <span>03_LIVE_SESSION_EXPLORER</span>
                        <div id="sync-status-indicator" class="flex items-center gap-2 text-[9px] text-[#ff00ff] opacity-0 transition-opacity duration-1000">
                            <span class="w-1.5 h-1.5 bg-[#ff00ff] rounded-full animate-ping"></span>
                            SYNCING_TO_DISK...
                        </div>
                    </h2>
                    
                    <div id="management-container" class="space-y-4">
                        <!-- Detailed Log management list injected here -->
                    </div>
                    
                    <div id="empty-management-state" class="hidden p-12 text-center border border-dashed border-zinc-800 rounded-sm">
                        <p class="text-xs text-zinc-600 uppercase tracking-widest">No telemetry data found for this session</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentState = {
            active_session_id: "session_1",
            advertised_session_id: "session_1",
            sessions: [
                { id: "session_1", date: "TBD", time: "TBD", location: "TBD", logs: [] }
            ]
        };

        // Load Initial Data
        async function init() {
            const cached = localStorage.getItem('vibe_pub_draft_v2');
            if (cached) {
                currentState = JSON.parse(cached);
                renderAll();
                return;
            }

            try {
                const response = await fetch('../data.json');
                const data = await response.json();
                currentState = data;
                saveDraft();
                renderAll();
            } catch (error) {
                console.error('No existing session found.');
                updatePreview();
            }
        }

        function saveDraft() {
            localStorage.setItem('vibe_pub_draft_v2', JSON.stringify(currentState));
            syncToDisk();
        }

        const BRIDGE_URL = 'http://localhost:5005';
        let bridgeOnline = false;

        async function checkBridge() {
            try {
                const response = await fetch(`${BRIDGE_URL}/status`);
                if (response.ok) {
                    bridgeOnline = true;
                    updateBridgeUI(true);
                } else {
                    throw new Error();
                }
            } catch (e) {
                bridgeOnline = false;
                updateBridgeUI(false);
            }
        }

        function updateBridgeUI(online) {
            const dot = document.getElementById('bridge-dot');
            const text = document.getElementById('bridge-text');
            if (online) {
                dot.classList.remove('status-offline');
                dot.classList.add('status-online');
                text.textContent = 'DISK_LINK: CONNECTED';
                text.classList.remove('text-zinc-600');
                text.classList.add('text-[#ff00ff]');
            } else {
                dot.classList.remove('status-online');
                dot.classList.add('status-offline');
                text.textContent = 'DISK_LINK: OFFLINE';
                text.classList.remove('text-[#ff00ff]');
                text.classList.add('text-zinc-600');
            }
        }

        async function syncToDisk() {
            if (!bridgeOnline) return;
            const statusIndicator = document.getElementById('sync-status-indicator');
            statusIndicator.style.opacity = '1';
            
            try {
                await fetch(`${BRIDGE_URL}/sync`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(currentState)
                });
                setTimeout(() => { statusIndicator.style.opacity = '0'; }, 1000);
            } catch (e) {
                console.error('Sync failed.');
                checkBridge();
            }
        }

        function renderAll() {
            const currentSession = currentState.sessions.find(s => s.id === currentState.active_session_id);
            if (!currentSession) return;

            // Render selector
            const selector = document.getElementById('session-select');
            selector.innerHTML = currentState.sessions.map(s => `
                <option value="${s.id}" ${s.id === currentState.active_session_id ? 'selected' : ''}>
                    ${s.date}
                </option>
            `).join('');

            // Render Meta Display
            const metaContainer = document.getElementById('session-meta-display');
            const isAdvertised = currentState.active_session_id === currentState.advertised_session_id;
            
            metaContainer.innerHTML = `
                <div class="space-y-4">
                    <div class="flex justify-between items-start gap-4 p-3 bg-[#080808] border border-zinc-900 rounded-sm">
                        <div class="flex-1 space-y-4">
                            <div>
                                <label class="text-[9px] text-zinc-600 uppercase font-bold">Session Date</label>
                                <div class="text-sm text-white">${currentSession.date}</div>
                            </div>
                            <div>
                                <label class="text-[9px] text-zinc-600 uppercase font-bold">Time Window</label>
                                <div class="text-sm text-zinc-400 font-mono">${currentSession.time}</div>
                            </div>
                            <div>
                                <label class="text-[9px] text-zinc-600 uppercase font-bold">Location</label>
                                <div class="text-sm text-zinc-400">${currentSession.location}</div>
                            </div>
                        </div>
                        <div class="flex flex-col gap-2 min-w-[120px]">
                            <button onclick="editSessionMeta()" class="text-[9px] uppercase px-3 py-2 border border-zinc-800 text-zinc-500 hover:border-[#00ffff] hover:text-[#00ffff] transition-all">Edit Metadata</button>
                            <button onclick="setAsAdvertised()" ${isAdvertised ? 'disabled' : ''} class="text-[9px] uppercase px-3 py-2 border ${isAdvertised ? 'border-[#ff00ff] text-[#ff00ff]' : 'border-zinc-800 text-zinc-500 hover:border-white hover:text-white'} transition-all">
                                ${isAdvertised ? 'Now Advertised' : 'Set as Banner'}
                            </button>
                            ${currentState.sessions.length > 1 ? `<button onclick="deleteSession()" class="text-[9px] uppercase px-3 py-2 border border-zinc-800 text-red-900/40 hover:text-red-500 transition-all">Delete Session</button>` : ''}
                        </div>
                    </div>
                </div>
            `;

            renderLogsList();
        }

        function renderLogsList() {
            const currentSession = currentState.sessions.find(s => s.id === currentState.active_session_id);
            const container = document.getElementById('management-container');
            const emptyState = document.getElementById('empty-management-state');
            
            if (!currentSession || currentSession.logs.length === 0) {
                container.innerHTML = "";
                emptyState.classList.remove('hidden');
                return;
            }
            emptyState.classList.add('hidden');

            container.innerHTML = currentSession.logs.map((log, index) => `
                <div class="p-6 bg-[#080808] border border-zinc-900 rounded-sm hover:border-zinc-700 transition-colors group">
                    <div class="flex justify-between items-start">
                        <div class="flex-1">
                            <div class="text-xs font-bold text-[#00ffff] mb-1">${log.name}</div>
                            <div class="text-[11px] text-zinc-400 leading-relaxed mb-3">${log.description}</div>
                            ${log.link ? `<div class="text-[9px] text-zinc-600 font-mono underline opacity-50 group-hover:opacity-100">${log.link}</div>` : ''}
                        </div>
                        <div class="flex gap-4 ml-4">
                            <button onclick="editLog(${index})" class="text-[10px] text-zinc-600 hover:text-white uppercase transition-colors">Edit</button>
                            <button onclick="deleteLog(${index})" class="text-[10px] text-red-900/50 hover:text-red-500 uppercase transition-colors">Delete</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function editSessionMeta() {
            const s = currentState.sessions.find(s => s.id === currentState.active_session_id);
            const date = prompt("Session Date:", s.date);
            const time = prompt("Time Window:", s.time);
            const loc = prompt("Location:", s.location);
            
            if (date !== null) s.date = date;
            if (time !== null) s.time = time;
            if (loc !== null) s.location = loc;
            
            saveDraft();
            renderAll();
        }

        function editLog(index) {
            const s = currentState.sessions.find(s => s.id === currentState.active_session_id);
            const log = s.logs[index];
            const name = prompt("Name:", log.name);
            const desc = prompt("Description:", log.description);
            const link = prompt("Link:", log.link);
            
            if (name !== null) log.name = name;
            if (desc !== null) log.description = desc;
            if (link !== null) log.link = link;
            
            saveDraft();
            renderLogsList();
        }

        function switchSession(id) {
            currentState.active_session_id = id;
            renderAll();
            saveDraft();
        }

        function setAsAdvertised() {
            currentState.advertised_session_id = currentState.active_session_id;
            saveDraft();
            renderAll();
        }

        function deleteSession() {
            if (confirm("Permanently delete this entire session and all its logs?")) {
                const idx = currentState.sessions.findIndex(s => s.id === currentState.active_session_id);
                currentState.sessions.splice(idx, 1);
                currentState.active_session_id = currentState.sessions[0].id;
                saveDraft();
                renderAll();
            }
        }

        function createNewSession() {
            const id = `session_${Date.now()}`;
            currentState.sessions.unshift({
                id: id,
                date: "NEW_SESSION",
                time: "TBD",
                location: "TBD",
                logs: []
            });
            currentState.active_session_id = id;
            currentState.advertised_session_id = id;
            saveDraft();
            renderAll();
        }

        function addLogEntry() {
            const name = document.getElementById('log-name').value;
            const link = document.getElementById('log-link').value;
            const desc = document.getElementById('log-desc').value;

            if (!name || !desc) {
                alert("Missing required fields.");
                return;
            }

            const currentSession = currentState.sessions.find(s => s.id === currentState.active_session_id);
            if (currentSession) {
                currentSession.logs.unshift({ name, description: desc, link });
                document.getElementById('log-name').value = "";
                document.getElementById('log-link').value = "";
                document.getElementById('log-desc').value = "";
                saveDraft();
                renderAll();
            }
        }

        function deleteLog(index) {
            const currentSession = currentState.sessions.find(s => s.id === currentState.active_session_id);
            if (currentSession && confirm("Delete log?")) {
                currentSession.logs.splice(index, 1);
                saveDraft();
                renderLogsList();
            }
        }

        function resetData() {
            if (confirm("ERASE LOCAL CACHE AND RE-SYNC FROM DISK?")) {
                localStorage.removeItem('vibe_pub_draft_v2');
                location.reload();
            }
        }

        init();
        checkBridge();
        setInterval(checkBridge, 5000);
    </script>
</body>
</html>
