<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vibe.pub | AI-Generated Pub Session Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --terminal-green: #00ff41;
            --terminal-glow: rgba(0, 255, 65, 0.2);
            --bg-dark: #0a0a0a;
            --border-muted: #1a1a1a;
        }
        body {
            font-family: 'JetBrains Mono', monospace;
            background-color: var(--bg-dark);
            color: #e0e0e0;
        }
        .glow-border {
            border: 1px solid var(--border-muted);
            transition: all 0.3s ease;
        }
        .glow-border:hover {
            border-color: var(--terminal-green);
            box-shadow: 0 0 15px var(--terminal-glow);
        }
        .scanline {
            width: 100%;
            height: 100px;
            z-index: 10;
            background: linear-gradient(0deg, rgba(0, 0, 0, 0) 0%, rgba(255, 255, 255, 0.02) 50%, rgba(0, 0, 0, 0) 100%);
            opacity: 0.1;
            position: fixed;
            bottom: 100%;
            animation: scanline 10s linear infinite;
        }
        @keyframes scanline {
            0% { bottom: 100%; }
            100% { bottom: -100px; }
        }
        .cursor-blink {
            animation: blink 1s step-end infinite;
        }
        @keyframes blink {
            from, to { color: transparent; }
            50% { color: var(--terminal-green); }
        }
    </style>
</head>
<body class="min-h-screen selection:bg-[#00ff41] selection:text-black">
    <div class="scanline pointer-events-none"></div>

    <div class="max-w-4xl mx-auto px-6 py-12 md:py-24">
        <!-- Hero Section -->
        <header class="mb-20">
            <h1 class="text-6xl md:text-8xl font-bold tracking-tighter mb-4 text-white">
                vibe<span class="text-[#00ff41]">.</span>pub
            </h1>
            <p class="text-lg md:text-xl text-zinc-500 leading-relaxed max-w-2xl">
                A monthly session where developers and enthusiasts build projects live using AI. Low friction, high output. <span class="text-[#00ff41]">_</span>
            </p>
        </header>

        <!-- Next Session Banner -->
        <section id="next-session" class="mb-20">
            <div class="glow-border bg-[#0d0d0d] p-8 rounded-sm relative overflow-hidden group">
                <div class="absolute top-0 right-0 p-4 opacity-10 group-hover:opacity-20 transition-opacity">
                    <svg class="w-24 h-24 text-[#00ff41]" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
                </div>
                <div class="relative z-10">
                    <div class="text-xs uppercase tracking-widest text-[#00ff41] mb-2 font-bold">Status: Incoming Session</div>
                    <div id="session-details" class="space-y-4">
                        <div class="text-3xl font-bold text-white tracking-tight">
                            <span id="session-date">Loading...</span>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-zinc-400">
                            <div class="flex items-center gap-2">
                                <span class="text-[#00ff41]">[ TIME ]</span>
                                <span id="session-time">...</span>
                            </div>
                            <div class="flex items-center gap-2">
                                <span class="text-[#00ff41]">[ LOC ]</span>
                                <span id="session-location">...</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Session Log -->
        <section>
            <div class="flex items-center justify-between mb-8 border-b border-zinc-800 pb-4">
                <h2 class="text-2xl font-bold text-white tracking-tight">Session Log</h2>
                <div id="log-count" class="text-xs text-zinc-500 font-mono">0 ENTRIES FOUND</div>
            </div>

            <div id="logs-container" class="space-y-6">
                <!-- Log Cards will be injected here -->
                <div class="text-zinc-600 italic py-12 text-center" id="empty-state">
                    Waiting for telemetry data...
                </div>
            </div>
        </section>

        <!-- Footer -->
        <footer class="mt-32 pt-12 border-t border-zinc-900 text-zinc-600 text-sm flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-4">
                <span>&copy; vibe.pub</span>
                <span class="opacity-20">|</span>
                <a href="#" class="hover:text-[#00ff41] transition-colors">GitHub</a>
            </div>
            <div class="flex items-center gap-2">
                <span class="w-2 h-2 bg-[#00ff41] rounded-full animate-pulse"></span>
                <span class="font-mono">UPLINK_STABLE</span>
            </div>
        </footer>
    </div>

    <script>
        async function loadData() {
            try {
                const response = await fetch('./data.json');
                const data = await response.json();
                renderPage(data);
            } catch (error) {
                console.error('Error fetching data:', error);
                document.getElementById('session-date').textContent = "ERROR_LOADING_DATA";
            }
        }

        function renderPage(data) {
            // Render Next Session
            const next = data.next_session;
            document.getElementById('session-date').textContent = next.date || 'TBD';
            document.getElementById('session-time').textContent = next.time || 'TBD';
            document.getElementById('session-location').textContent = next.location || 'TBD';

            // Render Logs
            const container = document.getElementById('logs-container');
            const emptyState = document.getElementById('empty-state');
            const logCount = document.getElementById('log-count');

            if (data.logs && data.logs.length > 0) {
                emptyState.classList.add('hidden');
                logCount.textContent = `${data.logs.length} ENTRIES FOUND`;
                
                container.innerHTML = data.logs.map(log => `
                    <div class="glow-border bg-[#0d0d0d] p-6 rounded-sm border-l-4 border-l-zinc-800 hover:border-l-[#00ff41] transition-all">
                        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-4">
                            <h3 class="text-lg font-bold text-[#00ff41]">${log.name || 'Anonymous'}</h3>
                            ${log.link ? `
                                <a href="${log.link}" target="_blank" class="text-xs text-zinc-500 hover:text-white flex items-center gap-1 group">
                                    <span class="group-hover:translate-x-1 transition-transform">ACCESS_PROJECT_LINK >></span>
                                </a>
                            ` : ''}
                        </div>
                        <p class="text-zinc-400 leading-relaxed font-light">
                            ${log.description || 'No data available.'}
                        </p>
                    </div>
                `).join('');
            } else {
                emptyState.classList.remove('hidden');
                logCount.textContent = "0 ENTRIES FOUND";
            }
        }

        // Initialize
        loadData();
    </script>
</body>
</html>
