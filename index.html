<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vibe.pub | AI-Generated Pub Session Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent-magenta: #ff00ff;
            --accent-cyan: #00ffff;
            --neon-glow-magenta: rgba(255, 0, 255, 0.3);
            --neon-glow-cyan: rgba(0, 255, 255, 0.3);
            --bg-dark: #050505;
            --border-muted: #1a1a1a;
        }
        body {
            font-family: 'JetBrains Mono', monospace;
            background-color: var(--bg-dark);
            color: #e0e0e0;
        }
        .glow-border {
            border: 1px solid var(--border-muted);
            transition: all 0.3s ease;
        }
        .glow-border:hover {
            border-color: var(--accent-magenta);
            box-shadow: 0 0 20px var(--neon-glow-magenta);
        }
        .scanline {
            width: 100%;
            height: 100px;
            z-index: 10;
            background: linear-gradient(0deg, rgba(0, 0, 0, 0) 0%, rgba(255, 255, 255, 0.02) 50%, rgba(0, 0, 0, 0) 100%);
            opacity: 0.1;
            position: fixed;
            bottom: 100%;
            animation: scanline 10s linear infinite;
        }
        @keyframes scanline {
            0% { bottom: 100%; }
            100% { bottom: -100px; }
        }
        .cursor-blink { animation: blink 1s step-end infinite; }
        @keyframes blink { from, to { color: transparent; } 50% { color: var(--accent-cyan); } }

        .glitch-text { position: relative; display: inline-block; }
        .glitch-text::before, .glitch-text::after {
            content: attr(data-text); position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.8;
        }
        .glitch-text::before { color: var(--accent-magenta); z-index: -1; animation: glitch-1 2s infinite linear alternate-reverse; }
        .glitch-text::after { color: var(--accent-cyan); z-index: -2; animation: glitch-2 3s infinite linear alternate-reverse; }
        @keyframes glitch-1 {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }
        @keyframes glitch-2 {
            0% { transform: translate(0); }
            20% { transform: translate(2px, -2px); }
            40% { transform: translate(2px, 2px); }
            60% { transform: translate(-2px, -2px); }
            80% { transform: translate(-2px, 2px); }
            100% { transform: translate(0); }
        }

        /* Session Vertical UI */
        .session-container {
            display: grid;
            grid-template-columns: 80px 1fr;
            gap: 2rem;
            position: relative;
        }
        .session-sidebar {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 1rem;
            border-right: 2px solid var(--border-muted);
            position: relative;
        }
        .session-sidebar::before, .session-sidebar::after {
            content: '';
            position: absolute;
            right: -2px;
            width: 15px;
            height: 2px;
            background-color: var(--accent-magenta);
            box-shadow: 0 0 10px var(--accent-magenta);
        }
        .session-sidebar::before { top: 0; }
        .session-sidebar::after { bottom: 0; }

        .vertical-metadata {
            writing-mode: vertical-rl;
            transform: rotate(180deg);
            text-transform: uppercase;
            letter-spacing: 0.2em;
            font-size: 10px;
            color: #555;
            display: flex;
            justify-content: space-between;
            height: 100%;
            padding: 2rem 0;
        }
        .vertical-metadata b { color: var(--accent-cyan); }
    </style>
</head>
<body class="min-h-screen selection:bg-[#ff00ff] selection:text-white">
    <div class="scanline pointer-events-none"></div>

    <div class="max-w-4xl mx-auto px-6 py-12 md:py-24">
        <!-- Hero Section -->
        <header class="mb-20 text-center md:text-left">
            <div class="inline-block mb-8">
                <img src="assets/vibe-pub-logo.png" alt="vibe.pub logo" class="h-32 md:h-48 w-auto mx-auto md:mx-0 drop-shadow-[0_0_15px_rgba(255,0,255,0.4)]">
            </div>
            <p class="text-lg md:text-xl text-zinc-500 leading-relaxed max-w-2xl">
                A monthly session where developers and enthusiasts build projects live using AI. Low friction, high output. <span class="text-[#ff00ff] cursor-blink">_</span>
            </p>
        </header>

        <!-- Next Session Banner -->
        <section id="next-session" class="mb-20">
            <div class="glow-border bg-[#0d0d0d] p-8 rounded-sm relative overflow-hidden group">
                <div class="absolute top-0 right-0 p-4 opacity-10 group-hover:opacity-20 transition-opacity">
                    <svg class="w-24 h-24 text-[#ff00ff]" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
                </div>
                <div class="relative z-10">
                    <div class="text-xs uppercase tracking-widest text-[#ff00ff] mb-2 font-bold glitch-text" data-text="Status: Incoming Session">Status: Incoming Session</div>
                    <div id="session-details" class="space-y-4">
                        <div class="text-3xl font-bold text-white tracking-tight">
                            <span id="session-date">Loading...</span>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-zinc-400">
                            <div class="flex items-center gap-2">
                                <span class="text-[#00ffff]">[ TIME ]</span>
                                <span id="session-time">...</span>
                            </div>
                            <div class="flex items-center gap-2">
                                <span class="text-[#00ffff]">[ LOC ]</span>
                                <span id="session-location">...</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Session Log -->
        <section>
            <div class="flex items-center justify-between mb-12 border-b border-zinc-800 pb-4">
                <h2 class="text-2xl font-bold text-white tracking-tight">Transmission History</h2>
                <div id="log-count" class="text-xs text-zinc-500 font-mono">0 SESSIONS DISCOVERED</div>
            </div>

            <div id="sessions-master-container" class="space-y-32">
                <!-- Grouped Sessions go here -->
                <div class="text-zinc-600 italic py-12 text-center" id="empty-state">
                    Waiting for telemetry data...
                </div>
            </div>
        </section>

        <!-- Footer -->
        <footer class="mt-32 pt-12 border-t border-zinc-900 text-zinc-600 text-sm flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-4">
                <span>&copy; vibe.pub</span>
                <span class="opacity-20">|</span>
                <a href="#" class="hover:text-[#ff00ff] transition-colors">GitHub</a>
            </div>
            <div class="flex items-center gap-2">
                <span class="w-2 h-2 bg-[#ff00ff] rounded-full animate-pulse"></span>
                <span class="font-mono">UPLINK_STABLE</span>
            </div>
        </footer>
    </div>

    <script>
        async function loadData() {
            try {
                const response = await fetch('./data.json');
                const data = await response.json();
                renderPage(data);
            } catch (error) {
                console.error('Error fetching data:', error);
                document.getElementById('session-date').textContent = "ERROR_LOADING_DATA";
            }
        }

        function renderPage(data) {
            // Render "Advertised" Session Banner
            const advertised = data.sessions.find(s => s.id === data.advertised_session_id);
            if (advertised) {
                document.getElementById('session-date').textContent = advertised.date || 'TBD';
                document.getElementById('session-time').textContent = advertised.time || 'TBD';
                document.getElementById('session-location').textContent = advertised.location || 'TBD';
            }

            // Render Grouped Sessions
            const masterContainer = document.getElementById('sessions-master-container');
            const emptyState = document.getElementById('empty-state');
            const logCount = document.getElementById('log-count');

            // Find sessions with logs (or all sessions?)
            const sessionsWithLogs = data.sessions.filter(s => s.logs && s.logs.length > 0);

            if (sessionsWithLogs.length > 0) {
                emptyState.classList.add('hidden');
                logCount.textContent = `${sessionsWithLogs.length} SESSIONS DISCOVERED`;
                
                masterContainer.innerHTML = sessionsWithLogs.map(session => `
                    <div class="session-container group">
                        <!-- Sidebar / Bracket -->
                        <div class="session-sidebar border-zinc-800 group-hover:border-[var(--accent-magenta)] transition-colors">
                            <div class="vertical-metadata font-mono">
                                <span><b>LOC</b> ${session.location || 'UNKNOWN'}</span>
                                <span class="my-8"><b>TIME</b> ${session.time || 'UNKNOWN'}</span>
                                <span><b>DATE</b> ${session.date || 'UNKNOWN'}</span>
                            </div>
                        </div>

                        <!-- Logs Grid -->
                        <div class="space-y-6">
                            ${session.logs.map(log => `
                                <div class="glow-border bg-[#0d0d0d] p-6 rounded-sm border-l-4 border-l-zinc-800 hover:border-l-[#ff00ff] transition-all">
                                    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-4">
                                        <h3 class="text-lg font-bold text-[#00ffff]">${log.name || 'Anonymous'}</h3>
                                        ${log.link ? `
                                            <a href="${log.link}" target="_blank" class="text-xs text-zinc-500 hover:text-white flex items-center gap-1 group">
                                                <span class="group-hover:translate-x-1 transition-transform tracking-widest">ACCESS_PROJECT_LINK &gt;&gt;</span>
                                            </a>
                                        ` : ''}
                                    </div>
                                    <p class="text-zinc-400 leading-relaxed font-light">
                                        ${log.description || 'No data available.'}
                                    </p>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `).join('');
            } else {
                emptyState.classList.remove('hidden');
                logCount.textContent = "0 SESSIONS DISCOVERED";
            }
        }

        // Initialize
        loadData();
    </script>
</body>
</html>
